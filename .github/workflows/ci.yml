name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [ingest, processing, training, inference]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          if [ -f apps/${{ matrix.app }}/requirements.txt ]; then pip install -r apps/${{ matrix.app }}/requirements.txt; fi
      - name: Lint
        run: ruff check apps/${{ matrix.app }} tests || true
      - name: Tests
        run: pytest -q tests
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
