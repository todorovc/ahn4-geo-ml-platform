apiVersion: batch/v1
kind: CronJob
metadata:
  name: ahn4-refresh-weekly
  namespace: data-platform
spec:
  schedule: "0 2 * * 0"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: ahn4-ingest
        spec:
          serviceAccountName: ahn-ingest-sa
          restartPolicy: Never
          containers:
            - name: ahn4-ingest
              image: REPLACE_WITH_ECR_URI/ahn4-ingest:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: AWS_REGION
                  value: "eu-west-1"
                - name: RAW_BUCKET
                  value: "geo-ml-ahn"
                - name: RAW_PREFIX
                  value: "raw/ahn4/dsm"
                - name: AHN_TILE_LIST_URL
                  value: "https://example.invalid/ahn4-tiles.csv"
